<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Vahaz Daily OS</title>
    <style>
        h2 {
            font-family: Georgia, serif;
            font-size: 22px;
            color: #111111;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 8px;
            margin-top: 35px;
            margin-bottom: 15px;
        }
        h3 {
            font-family: Georgia, serif;
            font-size: 18px;
            color: #2c3e50;
            margin-top: 25px;
            margin-bottom: 10px;
        }
        p {
            margin-top: 0;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        blockquote {
            margin: 20px 0;
            padding: 12px 20px;
            border-left: 4px solid #1a1a1a;
            background-color: #f7f9fa;
            font-style: italic;
            color: #333333;
        }
        code {
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 14px;
            background-color: #f1f3f5;
            padding: 2px 5px;
            border-radius: 3px;
            color: #c7254e;
        }
        pre {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            border: 1px solid #e9ecef;
            margin: 20px 0;
        }
        pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            color: #212529;
            font-size: 13px;
        }
        hr {
            border: 0;
            border-top: 1px solid #dee2e6;
            margin: 35px 0;
        }
        ul, ol {
            padding-left: 20px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        li {
            margin-bottom: 8px;
            line-height: 1.6;
        }
    </style>
</head>
<body style="margin: 0; padding: 30px 0; background-color: #f4f6f8; font-family: Georgia, serif; color: #1a1a1a; -webkit-font-smoothing: antialiased;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 680px; background-color: #ffffff; border: 1px solid #e1e8ed; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden;">
        <!-- Header -->
        <tr>
            <td style="padding: 40px 40px 20px 40px; text-align: center; border-bottom: 2px solid #1a1a1a;">
                <h1 style="margin: 0 0 10px 0; font-family: Georgia, serif; font-size: 34px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #1a1a1a;">The Vahaz Daily OS</h1>
                <div style="font-size: 14px; color: #657786; font-style: italic; letter-spacing: 0.5px;">{{DATE}}</div>
            </td>
        </tr>
        <!-- Content -->
        <tr>
            <td style="padding: 40px; font-size: 16px; line-height: 1.6; color: #1a1a1a;">
                {{CONTENT}}
            </td>
        </tr>
        <!-- Footer -->
        <tr>
            <td style="padding: 30px 40px; text-align: center; background-color: #f8f9fa; border-top: 1px solid #e1e8ed; font-size: 12px; color: #657786;">
                <p style="margin: 0 0 8px 0; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase;">Your personal knowledge operating system</p>
                <p style="margin: 0;">Designed for Vahaz &bull; BITS Pilani &bull; Skyworks Intern</p>
            </td>
        </tr>
    </table>
</body>
</html>
