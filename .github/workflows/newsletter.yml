name: Vahaz Daily OS Newsletter

on:
  schedule:
    - cron: '30 2 * * *'  # 8:00am IST (2:30am UTC)
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Newsletter Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          python main.py

      - name: Commit and Push new editions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add editions/
          git diff --quiet && git diff --staged --quiet || (git commit -m "edition: $(date +'%Y-%m-%d')" && git push)
